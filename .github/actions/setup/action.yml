name: Setup Node + deps
description: >-
  Resolve Node via .node-version, cache node_modules by lockfile hash,
  and run `npm ci` only on cache miss. Assumes the repo has already
  been checked out.

inputs:
  registry-url:
    description: 'npm registry URL to configure for setup-node (leave blank for setup-node default).'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version-file: .node-version
        cache: npm
        registry-url: ${{ inputs.registry-url }}

    - name: Cache node_modules
      id: node-modules-cache
      uses: actions/cache@v5
      with:
        path: node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('.node-version') }}-${{ hashFiles('package-lock.json') }}

    - name: Install dependencies
      if: steps.node-modules-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci --no-audit --no-fund
