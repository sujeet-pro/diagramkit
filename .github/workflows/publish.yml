name: Publish

# Manual release workflow. Runs the full `npm run cicd` gate sequentially
# (on one runner, so the version bump / tag / publish all see the same
# dist output), bumps the version, commits, tags, publishes to npm with
# provenance, and creates a GitHub Release. Use `dry_run: true` to
# exercise the pipeline end-to-end without publishing or pushing.
#
# Caching and Playwright setup mirror the CI workflow via the reusable
# composite actions under `.github/actions/`.

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Dry run — skip npm publish and GitHub Release'
        required: false
        type: boolean
        default: false

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node + deps
        uses: ./.github/actions/setup
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Run full cicd gate
        run: npm run cicd

      - name: Inspect npm package contents
        run: npm pack --dry-run

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # The cicd gate re-renders docs SVGs as part of `npm run build:docs`;
      # because Chromium / sharp output is platform-sensitive, a clean
      # checkout on Ubuntu may produce byte-different SVGs than what was
      # committed from a contributor laptop. Discard any non-source changes
      # to tracked artifacts so `npm version` (which requires a clean tree)
      # can proceed. Any *real* source changes would already have failed
      # `npm run check` / `npm run typecheck` upstream.
      - name: Reset render-only artifact diffs
        run: |
          git checkout -- 'docs/**/*.svg' || true
          git status --short

      - name: Bump version
        run: 'npm version ${{ inputs.release_type }} -m "release: v%s"'

      - name: Publish to npm (dry run)
        if: ${{ inputs.dry_run }}
        run: npm publish --dry-run --access public

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push version commit and tag
        if: ${{ !inputs.dry_run }}
        run: |
          git push origin ${{ github.ref_name }}
          git push origin --tags

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v$(node -p 'require("./package.json").version')" --generate-notes

      - name: Summary — dry run
        if: ${{ inputs.dry_run }}
        run: |
          echo "::notice::Dry run complete. No npm publish, git push, or GitHub Release was performed."
          echo "::notice::Next version would be v$(node -p 'require(\"./package.json\").version')"
