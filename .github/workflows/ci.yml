name: CI

# Node 24 in setup-node below — keep aligned with .node-version and package.json engines

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Build library
        run: npm run lib:build

      - name: Check formatting and linting
        run: npm run check

      - name: Typecheck
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run lib:build

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Run unit tests
        run: npm run test:unit

      - name: Run e2e tests
        run: npm run test:e2e

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Build library and docs
        run: npm run build:all

      - name: Verify dist output exists
        run: |
          test -d dist
          test -f dist/index.mjs
          test -f dist/index.d.mts
          test -f dist/utils.mjs
          test -f dist/utils.d.mts
          test -f dist/cli/bin.mjs
          test -f schemas/diagramkit-cli-render.v1.json

      - name: Verify exported targets exist
        run: |
          node --input-type=module <<'EOF'
          import { existsSync, readFileSync } from 'node:fs'

          const pkg = JSON.parse(readFileSync('./package.json', 'utf-8'))
          const missing = []

          function visit(value) {
            if (typeof value === 'string') {
              if (value.includes('*')) return
              if (!existsSync(value)) missing.push(value)
              return
            }
            if (!value || typeof value !== 'object') return
            for (const nested of Object.values(value)) visit(nested)
          }

          visit(pkg.exports)

          if (missing.length > 0) {
            console.error(`Missing export targets:\n${missing.join('\n')}`)
            process.exit(1)
          }
          EOF

      - name: Inspect npm package contents
        run: npm pack --dry-run

      - name: Verify docs output exists
        run: test -d gh-pages

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: gh-pages

  deploy-pages:
    name: Deploy Pages
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: [check, test, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
