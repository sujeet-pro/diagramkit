name: CICD

# Parallel gate that mirrors `npm run cicd`. Each job is independent
# (no matrix fail-fast), so when multiple gates fail you see every
# failure in a single run. Jobs that genuinely need a prior artifact
# (unit/e2e/docs/validate-build all consume `dist/`) consume it via
# `actions/download-artifact` instead of re-running `npm run build:lib`.
#
# Caching:
#   - node_modules is cached by .node-version + package-lock.json hash
#     inside the reusable `./.github/actions/setup` composite action;
#     `npm ci` only runs on a cache miss.
#   - Playwright browsers are cached by package-lock.json hash inside
#     `./.github/actions/setup-playwright`; apt system deps are always
#     (re)installed because GitHub does not cache them.
#
# Dependency graph:
#
#   ┌── lint ────────────────────────────────────┐
#   ├── typecheck ───────────────────────────────┤
#   └── build-lib ──┬── lib-pack-check ──────────┤
#                   ├── unit ───────────────────┤
#                   ├── e2e ────────────────────┼── summary ── deploy-docs (main only)
#                   └── docs-build ──┬──────────┤
#                                    └── validate-build
#
# See `.agents/skills/prj-review-repo/references/contributor-workflow.md`
# for the matching local `npm run cicd` pipeline description.

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint + format + audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: npm audit
        run: npm audit --audit-level=moderate
      - name: Lint + format (oxlint / oxfmt)
        run: npm run check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - run: npm run typecheck

  build-lib:
    name: Build library
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Build library (vp pack)
        run: npm run build:lib
      - name: Verify dist output exists
        run: |
          test -d dist
          test -f dist/index.mjs
          test -f dist/index.d.mts
          test -f dist/utils.mjs
          test -f dist/utils.d.mts
          test -f dist/cli/bin.mjs
          test -f schemas/diagramkit-cli-render.v1.json
          test -f schemas/diagramkit-config.v1.json
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1
          if-no-files-found: error

  lib-pack-check:
    name: Library pack check
    runs-on: ubuntu-latest
    needs: [build-lib]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Inspect npm package contents
        run: npm pack --dry-run

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [build-lib]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - run: npm run test:unit

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [build-lib]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: ./.github/actions/setup-playwright
      - run: npm run test:e2e

  docs-build:
    name: Docs build
    runs-on: ubuntu-latest
    needs: [build-lib]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: ./.github/actions/setup-playwright
      - uses: actions/configure-pages@v6
      # Run the pieces of `npm run build:docs` directly so we don't trip the
      # `prebuild:docs` → `render:docs` → `npm run build:lib` cascade that
      # would rebuild the library we just downloaded as an artifact.
      - name: Render docs diagrams (CLI)
        run: node ./dist/cli/bin.mjs render docs/
      - name: Build docs site (pagesmith)
        run: node --experimental-strip-types --no-warnings ./scripts/run-pagesmith.ts build
      - name: Copy llms context files
        run: node --experimental-strip-types --no-warnings ./scripts/copy-llms.ts
      - name: Verify docs output exists
        run: test -d gh-pages
      - name: Upload gh-pages artifact (internal)
        uses: actions/upload-artifact@v4
        with:
          name: gh-pages
          path: gh-pages
          retention-days: 1
          if-no-files-found: error
      - name: Upload rendered diagram SVGs (for validate-build)
        uses: actions/upload-artifact@v4
        with:
          name: docs-rendered-svgs
          path: docs/**/.diagramkit/**
          retention-days: 1
          if-no-files-found: error
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: gh-pages

  validate-build:
    name: Validate build
    runs-on: ubuntu-latest
    needs: [build-lib, docs-build]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Download gh-pages artifact
        uses: actions/download-artifact@v4
        with:
          name: gh-pages
          path: gh-pages
      - name: Download rendered diagram SVGs
        uses: actions/download-artifact@v4
        with:
          name: docs-rendered-svgs
          path: .
      - name: Run validate-build script
        run: node --experimental-strip-types --no-warnings ./scripts/validate-build.ts

  summary:
    name: CICD summary
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build-lib, lib-pack-check, unit, e2e, docs-build, validate-build]
    if: always()
    steps:
      - name: Fail if any required job failed
        env:
          RESULTS: |
            lint=${{ needs.lint.result }}
            typecheck=${{ needs.typecheck.result }}
            build-lib=${{ needs.build-lib.result }}
            lib-pack-check=${{ needs.lib-pack-check.result }}
            unit=${{ needs.unit.result }}
            e2e=${{ needs.e2e.result }}
            docs-build=${{ needs.docs-build.result }}
            validate-build=${{ needs.validate-build.result }}
        run: |
          echo "CICD gate results:"
          echo "$RESULTS"
          fail=0
          while IFS='=' read -r name result; do
            [ -z "$name" ] && continue
            if [ "$result" != "success" ]; then
              echo "::error::Gate '$name' finished with result '$result'"
              fail=1
            fi
          done <<< "$RESULTS"
          if [ "$fail" = "1" ]; then
            echo "One or more CICD gates failed."
            exit 1
          fi
          echo "All CICD gates passed."

  deploy-docs:
    name: Deploy docs (gh-pages)
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: [summary]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
