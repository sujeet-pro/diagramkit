name: CICD

# Parallelized gates matching `npm run cicd`. Each gate runs as an independent
# job so a single failure surfaces fast without blocking other results.
# Keep Node version aligned with .node-version and package.json engines.

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Lint + format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build:lib
      - run: npm run test:unit

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build:lib
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  lib-build:
    name: Library build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build:lib
      - name: Verify dist output exists
        run: |
          test -d dist
          test -f dist/index.mjs
          test -f dist/index.d.mts
          test -f dist/utils.mjs
          test -f dist/utils.d.mts
          test -f dist/cli/bin.mjs
          test -f schemas/diagramkit-cli-render.v1.json
          test -f schemas/diagramkit-config.v1.json
      - name: Inspect npm package contents
        run: npm pack --dry-run

  docs-build:
    name: Docs build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
      - uses: actions/configure-pages@v6
      - run: npm ci
      - run: npm run build:lib
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - name: Build docs (renders diagrams via prebuild:docs)
        run: npm run build:docs
      - name: Verify docs output exists
        run: test -d gh-pages
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: gh-pages

  validate-build:
    name: Validate build
    runs-on: ubuntu-latest
    needs: [lib-build, docs-build]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
      - uses: actions/configure-pages@v6
      - run: npm ci
      - run: npm run build:lib
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npm run build:docs
      - name: Run validate-build script
        run: node --experimental-strip-types --no-warnings ./scripts/validate-build.ts
      - name: Verify exported targets exist
        run: |
          node --input-type=module <<'EOF'
          import { existsSync, readFileSync } from 'node:fs'

          const pkg = JSON.parse(readFileSync('./package.json', 'utf-8'))
          const missing = []

          function visit(value) {
            if (typeof value === 'string') {
              if (value.includes('*')) return
              if (!existsSync(value)) missing.push(value)
              return
            }
            if (!value || typeof value !== 'object') return
            for (const nested of Object.values(value)) visit(nested)
          }

          visit(pkg.exports)

          if (missing.length > 0) {
            console.error(`Missing export targets:\n${missing.join('\n')}`)
            process.exit(1)
          }
          EOF

  summary:
    name: CICD summary
    runs-on: ubuntu-latest
    needs: [check, typecheck, unit, e2e, lib-build, docs-build, validate-build]
    if: always()
    steps:
      - name: Fail if any required job failed
        run: |
          if [ "${{ needs.check.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.unit.result }}" != "success" ] || \
             [ "${{ needs.e2e.result }}" != "success" ] || \
             [ "${{ needs.lib-build.result }}" != "success" ] || \
             [ "${{ needs.docs-build.result }}" != "success" ] || \
             [ "${{ needs.validate-build.result }}" != "success" ]; then
            echo "One or more CICD gates failed."
            exit 1
          fi
          echo "All CICD gates passed."

  deploy-docs:
    name: Deploy docs (gh-pages)
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: [summary]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
